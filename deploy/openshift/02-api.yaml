apiVersion: apps/v1
kind: Deployment
metadata:
  name: cp-catalog-api
  namespace: cp-catalog
  labels: { app: cp-catalog, component: api }
spec:
  replicas: 2
  selector: { matchLabels: { app: cp-catalog, component: api } }
  template:
    metadata: { labels: { app: cp-catalog, component: api } }
    spec:
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/cp-catalog/cp-catalog-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: cp-catalog-secret }
            - configMapRef: { name: cp-catalog-config }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: cp-catalog-api
  namespace: cp-catalog
spec:
  selector: { app: cp-catalog, component: api }
  ports: [{ port: 8000, targetPort: 8000 }]
