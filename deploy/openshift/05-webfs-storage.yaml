apiVersion: v1
kind: PersistentVolume
metadata:
  name: cp-catalog-webfs
spec:
  capacity: { storage: 10Gi }
  accessModes: [ReadOnlyMany]
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: cp-catalog-webfs
    volumeAttributes:
      source: "//qcwebfs.testbbh.com/fixed_income_quant_jupyter$/CP-CATALOG"
    nodeStageSecretRef:
      name: cp-catalog-webfs-secret
      namespace: cp-catalog
  mountOptions: [dir_mode=0555, file_mode=0444, vers=3.0]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cp-catalog-webfs
  namespace: cp-catalog
spec:
  accessModes: [ReadOnlyMany]
  resources: { requests: { storage: 10Gi } }
  volumeName: cp-catalog-webfs
  storageClassName: ""
